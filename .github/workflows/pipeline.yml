name: CI/CD Multi-Stage Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: flask-app
  IMAGE_TAG: latest

jobs:

  build-and-test:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Save image for next job
        run: |
          docker save $ECR_REPOSITORY:$IMAGE_TAG > image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar


  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image again for scan
        run: docker build -t flask-app:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app:latest
          format: table
          exit-code: 0   # não quebra pipeline (importante pra dev)
          ignore-unfixed: true


  push-to-ecr:
    name: Push to AWS ECR
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-central-1 \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}

      - name: Build image
        run: docker build -t flask-app .

      - name: Tag image
        run: |
          docker tag flask-app:latest ${{ secrets.ECR_URL }}/flask-app:latest

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_URL }}/flask-app:latest